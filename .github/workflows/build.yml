name: Build AOG-TUVR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyserial

    - name: Build AOG-TUVR
      run: |
        $ICON_FLAG = ""
        if (Test-Path "icon.ico") {
          $ICON_FLAG = "--icon=icon.ico"
          Write-Host "Using icon: icon.ico"
        } else {
          Write-Host "WARNING: icon.ico not found!"
        }
        pyinstaller --onefile --console --name "AOG-TUVR" $ICON_FLAG "AOG_TUVR_bridge.py"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AOG-TUVR
        path: dist/AOG-TUVR.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/AOG-TUVR.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
